        :root {
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
    --primary-light: rgba(124, 58, 237, 0.15);
    --primary-lighter: rgba(124, 58, 237, 0.08);
    --accent: #2563eb;
    --accent-light: rgba(37, 99, 235, 0.15);
    --accent2: #06b6d4;
    --success: #10b981;
    --warning: #f59e0b;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --text-light: #9ca3af;
    --bg: #f0f4ff;
    --bg-secondary: #e8eeff;
    --surface: #ffffff;
    --surface-hover: #f1f5ff;
    --border: #c7d2fe;
    --border-light: #e0e7ff;
    --glass: rgba(255, 255, 255, 0.85);
    --shadow-xs: 0 1px 2px 0 rgb(124 58 237 / 0.08);
    --shadow-sm: 0 1px 3px 0 rgb(124 58 237 / 0.12), 0 1px 2px -1px rgb(124 58 237 / 0.1);
    --shadow: 0 4px 6px -1px rgb(124 58 237 / 0.15), 0 2px 4px -2px rgb(37 99 235 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(124 58 237 / 0.2), 0 4px 6px -4px rgb(37 99 235 / 0.1);
    --shadow-xl: 0 20px 25px -5px rgb(124 58 237 / 0.25), 0 8px 10px -6px rgb(37 99 235 / 0.15);
    --shadow-glow: 0 0 30px rgba(124, 58, 237, 0.4);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #2563eb 60%, #06b6d4 100%);
    --gradient-accent: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
    --gradient-surface: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
    --gradient-hero: linear-gradient(135deg, #4c1d95 0%, #1e3a8a 50%, #0e7490 100%);
}

.dark-mode {
    --primary: #8b5cf6;
    --primary-hover: #a78bfa;
    --primary-light: rgba(139, 92, 246, 0.18);
    --primary-lighter: rgba(139, 92, 246, 0.09);
    --accent: #3b82f6;
    --accent-light: rgba(59, 130, 246, 0.18);
    --accent2: #22d3ee;
    --text: #e2e8ff;
    --text-muted: #94a3b8;
    --text-light: #64748b;
    --bg: #0a0a1a;
    --bg-secondary: #0f0f2a;
    --surface: #13132b;
    --surface-hover: #1a1a3e;
    --border: #2d2d5e;
    --border-light: #1e1e42;
    --glass: rgba(19, 19, 43, 0.85);
    --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.5);
    --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.6), 0 1px 2px -1px rgb(0 0 0 / 0.5);
    --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.6), 0 2px 4px -2px rgb(0 0 0 / 0.5);
    --shadow-lg: 0 10px 20px -3px rgba(124, 58, 237, 0.35), 0 4px 6px -4px rgba(37, 99, 235, 0.2);
    --shadow-xl: 0 20px 35px -5px rgba(124, 58, 237, 0.45), 0 8px 10px -6px rgba(37, 99, 235, 0.25);
    --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.5);
    --gradient-primary: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 60%, #22d3ee 100%);
    --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    --gradient-surface: linear-gradient(135deg, #13132b 0%, #0f0f2a 100%);
    --gradient-hero: linear-gradient(135deg, #1e0a4e 0%, #0c1f5e 50%, #0a3d52 100%);
}

* { box-sizing: border-box; }

body {
    font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
}

header {
    background: var(--gradient-primary);
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg), 0 0 60px rgba(124,58,237,0.3);
    backdrop-filter: blur(20px);
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;

function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
    if (typeof obj === 'string') return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
    if (obj instanceof Uint8Array) { if (obj.length > maxArrayLen) return `[Uint8Array too large (${obj.length} bytes), truncated]`; return obj; }
    if (Array.isArray(obj)) return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
    if (obj && typeof obj === 'object') { const newObj = {}; for (const key in obj) { if (obj.hasOwnProperty(key)) newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen); } return newObj; }
    return obj;
}

async function saveData() {
    alert("This might take a while, dont touch anything other than this OK button");
    const result = {};
    result.cookies = document.cookie;
    result.localStorage = {...localStorage};
    result.sessionStorage = {...sessionStorage};
    result.indexedDB = {};
    const dbs = await indexedDB.databases();
    for (const dbInfo of dbs) {
      if (!dbInfo.name) continue;
      result.indexedDB[dbInfo.name] = {};
      await new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
        openRequest.onerror = () => reject(openRequest.error);
        openRequest.onsuccess = () => {
          const db = openRequest.result;
          const storeNames = Array.from(db.objectStoreNames);
          if (storeNames.length === 0) { resolve(); return; }
          const transaction = db.transaction(storeNames, "readonly");
          const storePromises = [];
          for (const storeName of storeNames) {
            result.indexedDB[dbInfo.name][storeName] = [];
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();
            const p = new Promise((res, rej) => {
              getAllRequest.onsuccess = () => { result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100); res(); };
              getAllRequest.onerror = () => rej(getAllRequest.error);
            });
            storePromises.push(p);
          }
          Promise.all(storePromises).then(() => resolve());
        };
      });
    }
    result.caches = {};
    const cacheNames = await caches.keys();
    for (const cacheName of cacheNames) {
      const cache = await caches.open(cacheName);
      const requests = await cache.keys();
      result.caches[cacheName] = [];
      for (const req of requests) {
        const response = await cache.match(req);
        if (!response) continue;
        const cloned = response.clone();
        const contentType = cloned.headers.get('content-type') || '';
        let body;
        try {
          if (contentType.includes('application/json')) body = await cloned.json();
          else if (contentType.includes('text') || contentType.includes('javascript')) body = await cloned.text();
          else { const buffer = await cloned.arrayBuffer(); body = btoa(String.fromCharCode(...new Uint8Array(buffer))); }
        } catch (e) { body = '[Unable to read body]'; }
        result.caches[cacheName].push({ url: req.url, body, contentType });
      }
    }
    alert("Done, wait for the download to come");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
    link.download = `${Date.now()}.data`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

async function loadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function (e) {
        const data = JSON.parse(e.target.result);
        if (data.cookies) data.cookies.split(';').forEach(cookie => { document.cookie = cookie.trim(); });
        if (data.localStorage) { for (const key in data.localStorage) localStorage.setItem(key, data.localStorage[key]); }
        if (data.sessionStorage) { for (const key in data.sessionStorage) sessionStorage.setItem(key, data.sessionStorage[key]); }
        if (data.indexedDB) {
            for (const dbName in data.indexedDB) {
              const stores = data.indexedDB[dbName];
              await new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => { const db = e.target.result; for (const storeName in stores) { if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true }); } };
                request.onsuccess = e => {
                  const db = e.target.result;
                  const transaction = db.transaction(Object.keys(stores), 'readwrite');
                  transaction.onerror = () => reject(transaction.error);
                  let pendingStores = Object.keys(stores).length;
                  for (const storeName in stores) {
                    const objectStore = transaction.objectStore(storeName);
                    objectStore.clear().onsuccess = () => { for (const item of stores[storeName]) objectStore.put(item); pendingStores--; if (pendingStores === 0) resolve(); };
                  }
                };
                request.onerror = () => reject(request.error);
              });
            }
        }
        if (data.caches) {
            for (const cacheName in data.caches) {
              const cache = await caches.open(cacheName);
              await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
              for (const entry of data.caches[cacheName]) {
                let responseBody;
                if (entry.contentType.includes('application/json')) responseBody = JSON.stringify(entry.body);
                else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) responseBody = entry.body;
                else { const binaryStr = atob(entry.body); const len = binaryStr.length; const bytes = new Uint8Array(len); for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i); responseBody = bytes.buffer; }
                const headers = new Headers({ 'content-type': entry.contentType });
                const response = new Response(responseBody, { headers });
                await cache.put(entry.url, response);
              }
            }
        }
        alert("Data loaded");
    };
    alert("This might take a while, dont touch anything other than this OK button");
    reader.readAsText(file);
}

let _allStatsCache = null;
async function getAllStats() {
  if (_allStatsCache) return _allStatsCache;
  const BASE_URL = "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files";
  const PERIOD = "year";
  const PAGE_BATCH = 5;
  let page = 1, done = false;
  const combinedMap = Object.create(null);
  while (!done) {
    const pages = Array.from({ length: PAGE_BATCH }, (_, i) => page + i);
    const responses = await Promise.all(pages.map(p => fetch(`${BASE_URL}?period=${PERIOD}&page=${p}&limit=100`).then(r => r.ok ? r.json() : cleanFetch(`${BASE_URL}?period=${PERIOD}&page=${p}&limit=100`).then(r2 => r2.ok ? r2.json() : []))));
    for (const data of responses) {
      if (!Array.isArray(data) || data.length === 0) { done = true; break; }
      for (const item of data) {
        if (!item?.name) continue;
        const match = item.name.match(/^\/(\d+)([.-])/);
        if (!match) continue;
        const id = match[1];
        if (!combinedMap[id]) combinedMap[id] = { hits: 0, bandwidth: 0 };
        combinedMap[id].hits += item.hits?.total ?? 0;
        combinedMap[id].bandwidth += item.bandwidth?.total ?? 0;
      }
    }
    page += PAGE_BATCH;
  }
  _allStatsCache = combinedMap;
  return combinedMap;
}

async function getStats(id) {
  id = String(id);
  const allStats = await getAllStats();
  return allStats[id]?.hits ?? 0;
}
